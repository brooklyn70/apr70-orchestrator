services:
  orchestrator:
    image: apr70-orchestrator:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apr70-orchestrator
    restart: unless-stopped
    env_file: .env
    environment:
      ORCHESTRATOR_STATE_DIR: /state
      ORCHESTRATOR_WORK_DIR: /work
    volumes:
      # Spend log (USAGE.jsonl); TASKS.md + BRIEF.md live in the mounted work repo
      - ./state:/state
      # The v3 site checkout that Claude Code subprocess works on
      - /volume1/apps/apr70-pictures:/work
      # Mirror the host path inside the container so `docker compose` invoked
      # against the host daemon sees identical build-context and volume paths
      # on both sides (compose CLI reads the build context from inside this
      # container; the daemon resolves runtime volume paths on the host).
      - /volume1/apps/apr70-pictures:/volume1/apps/apr70-pictures
      # Docker socket — allows [nas-shell] tasks to run docker commands on the host
      - /var/run/docker.sock:/var/run/docker.sock
    # v1: not auto-running. Marco invokes one-shot from tmux when ready.
    # v2 will set this to a daemon command.
    command: ["sleep", "infinity"]
